# Jarvis project config — ONE layer (this file + env). All keys live in jarvis/config.py.

[voice]
# This deployment speaks in the cloned "Jarvis" voice (XTTS-v2) — and only that voice.
# The reference clip ships in this (private) repo and is mounted at /project in Docker; the
# container's entrypoint selects XTTS automatically whenever it's present.
tts_engine     = "xtts"
xtts_reference = "jarvis-voice.wav"
xtts_language  = "en"

# Push-to-talk only (no wake word). STT + device are automatic (GPU when present, else CPU).
wake_enabled  = false
ptt_enabled   = true
whisper_model = "base.en"
whisper_device = "auto"

[dashboard]
port = 8765
