# ── Jarvis: LOCAL ZERO-SHOT VOICE CLONE (XTTS-v2) ─────────────────────────────────────────
#
# Make Jarvis speak in the timbre of a reference clip you provide — no training. XTTS-v2 listens
# to a short, clean sample of a voice and imitates it on the fly. This is the fast way to hear
# whether a clone even lands before committing to a full fine-tune.
#
# ── ONE HONEST CAVEAT ─────────────────────────────────────────────────────────────────────
# If your reference is the movie Jarvis, that's Paul Bettany's real voice in copyrighted Disney/
# Marvel audio. For a PRIVATE assistant only you hear, that's a low-risk gray area — but keep it
# personal: don't publish or distribute the generated audio. To share, use a non-celebrity
# British reference (or the free Kokoro "butler archetype", tts_engine = "kokoro") instead.
#
# ── SETUP (best in its OWN environment; XTTS pulls torch) ──────────────────────────────────
#   1. A dedicated env is safest (coqui-tts is happiest on Python 3.11):
#        py -3.11 -m venv .venv-clone && .venv-clone\Scripts\activate
#   2. Install Jarvis + the clone engine:
#        pip install -e .[voice,dashboard,clone]
#   3. For real-time speed, install a CUDA torch build for your GPU (CPU XTTS is far too slow):
#        pip install torch --index-url https://download.pytorch.org/whl/cu121   # match your CUDA
#   4. Prepare ONE clean reference clip:  ~6–30 s, mono WAV, just the target voice — no music,
#      no sound effects, no other speakers. 15 s of clear speech is plenty. Point xtts_reference
#      at it (absolute path). The first run downloads the ~1.8 GB XTTS-v2 checkpoint once.
#   5. Run:  jarvis --voice   (or jarvis --remote to drive it from a laptop over the SSH tunnel).
#      Watch the startup line:  [device] TTS · XTTS-v2 clone (jarvis.wav) → cuda ...
#      If it says "→ cpu" while you asked for cuda, your torch has no GPU — reinstall the CUDA build.

[voice]
tts_engine     = "xtts"
xtts_reference = "C:/Users/you/jarvis/refs/jarvis-15s.wav"   # <-- your clean reference clip
xtts_language  = "en"
xtts_temperature = 0.7        # lower = steadier, more controlled; higher = more variation
xtts_device    = "cuda"       # "auto" | "cuda" | "cpu"  (CPU is impractically slow for XTTS)

# Push-to-talk only (no wake word) — same as the other profiles.
wake_enabled = false
ptt_enabled  = true

# Speech-to-text: keep it local too. On a GPU box, use the CUDA dials (see the remote profile).
whisper_model  = "base.en"
whisper_device = "auto"
