# ── Jarvis desktop profile: REMOTE / TUNNELED voice on a GPU box ──────────────────────────
#
# Copy this to  <this-project>/.jarvis/config.toml  ON THE DESKTOP (the machine with the GPU),
# then run:  jarvis --remote
#
# The desktop does everything — brain, speech-to-text, and text-to-speech (on the GPU). A
# laptop (or any other machine) just opens the dashboard in a browser and becomes the mic +
# speaker. Link them with an SSH port-forward so the browser reaches the dashboard at
# http://localhost:<port> — that "localhost" is what lets the browser use the microphone
# (getUserMedia needs a secure context; a bare LAN IP does NOT qualify):
#
#     # on the laptop:
#     ssh -L 8765:localhost:8765 <this-desktop-host>
#     # then open http://localhost:8765/  in Chrome/Edge and hold "HOLD TO TALK" (or the space bar)
#
# TIP: you don't have to hand-set the "cuda" device lines below — running `.\install.ps1` (or
# `jarvis --machine-init`) on this desktop records [machine] gpu = true in ~/.jarvis/machine.toml,
# and the runtime then uses CUDA for STT + TTS automatically on this box. The explicit values below
# still work (and win if set); they're spelled out here to show exactly what the GPU profile does.
#
# `jarvis --remote` already forces transport=browser + dashboard on; the [voice] block below is
# really about putting STT + TTS on the GPU. Prereqs on the desktop:
#     pip install -e .[voice,dashboard,kokoro]   # STT (faster-whisper) + dashboard + local TTS (Kokoro)
#     pip install onnxruntime-gpu                # Kokoro on the GPU  (needs matching CUDA + cuDNN on PATH)
#     # faster-whisper (CTranslate2) on the GPU needs cuBLAS + cuDNN too — the pip
#     #   nvidia-cublas-cu12 / nvidia-cudnn-cu12 wheels satisfy both stacks.

[voice]
transport = "browser"          # a browser tab is the mic + speaker (same as passing --remote)

# ---- Text-to-speech: local Kokoro on the GPU ----
tts_engine   = "kokoro"
kokoro_voice = "bm_george"     # British male; also bm_lewis, bm_daniel, bm_fable
kokoro_lang  = "en-gb"
kokoro_device = "cuda"         # GPU via onnxruntime-gpu; "auto" falls back to CPU if absent

# ---- Speech-to-text: faster-whisper on the GPU ----
whisper_model        = "small.en"       # the GPU can afford a bigger model than the laptop's base.en
whisper_device       = "cuda"
whisper_compute_type = "int8_float16"   # correct dial for a Quadro P4000 (Pascal, sm_61): Pascal
                                        # has poor native FP16, so plain "float16" is slow — int8
                                        # GEMM via cuBLAS is fast. (Use "float16" only on Turing+.)
whisper_beam_size    = 1

wake_enabled = false           # push-to-talk only (the on-screen button / space bar in the browser)
ptt_enabled  = true

[dashboard]
enabled  = true
host     = "127.0.0.1"         # loopback ONLY — reached over the SSH tunnel, never exposed on the LAN
port     = 8765
auto_open = false              # the tab lives on the far side of the tunnel, not on the desktop
